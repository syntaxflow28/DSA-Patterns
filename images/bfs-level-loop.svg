<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">THE LEVEL-SIZE SNAPSHOT</text>
  <line x1="170" y1="95"  x2="110" y2="170" stroke="#64748b" stroke-width="1.8"/>
  <line x1="170" y1="95"  x2="230" y2="170" stroke="#64748b" stroke-width="1.8"/>
  <line x1="110" y1="170" x2="60"  y2="245" stroke="#64748b" stroke-width="1.8"/>
  <line x1="110" y1="170" x2="150" y2="245" stroke="#64748b" stroke-width="1.8"/>
  <line x1="230" y1="170" x2="270" y2="245" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="170" cy="95"  r="16" fill="#334155" stroke="#475569"/><text x="170" y="100" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">A</text>
  <circle cx="110" cy="170" r="16" fill="#3b82f6"/><text x="110" y="175" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">B</text>
  <circle cx="230" cy="170" r="16" fill="#3b82f6"/><text x="230" y="175" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">C</text>
  <circle cx="60"  cy="245" r="16" fill="#a78bfa"/><text x="60"  y="250" fill="#1e1b4b" font-size="13" font-weight="bold" text-anchor="middle">D</text>
  <circle cx="150" cy="245" r="16" fill="#a78bfa"/><text x="150" y="250" fill="#1e1b4b" font-size="13" font-weight="bold" text-anchor="middle">E</text>
  <circle cx="270" cy="245" r="16" fill="#a78bfa"/><text x="270" y="250" fill="#1e1b4b" font-size="13" font-weight="bold" text-anchor="middle">F</text>
  <text x="40" y="300" fill="#94a3b8" font-size="12">A drained &#183; level {B,C} queued &#183; {D,E,F} not yet generated</text>

  <text x="420" y="70" fill="#e2e8f0" font-size="13" font-weight="bold">round start:</text>
  <g font-size="13" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="540" y="50" width="50" height="32" rx="6" fill="#1e3a8a" stroke="#3b82f6"/><text x="565" y="71" fill="#93c5fd">B</text>
    <rect x="596" y="50" width="50" height="32" rx="6" fill="#1e3a8a" stroke="#3b82f6"/><text x="621" y="71" fill="#93c5fd">C</text>
  </g>
  <text x="670" y="71" fill="#f59e0b" font-size="12.5" font-family="Consolas, monospace">sz = q.size() = 2</text>
  <text x="420" y="120" fill="#94a3b8" font-size="12.5">the queue holds ALL of level d and NOTHING else &#8212;</text>
  <text x="420" y="140" fill="#94a3b8" font-size="12.5">q.size() is a perfect census of the level</text>
  <text x="420" y="180" fill="#e2e8f0" font-size="13" font-weight="bold">after exactly sz pops:</text>
  <g font-size="13" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="600" y="160" width="50" height="32" rx="6" fill="#4c1d95" stroke="#a78bfa"/><text x="625" y="181" fill="#c4b5fd">D</text>
    <rect x="656" y="160" width="50" height="32" rx="6" fill="#4c1d95" stroke="#a78bfa"/><text x="681" y="181" fill="#c4b5fd">E</text>
    <rect x="712" y="160" width="50" height="32" rx="6" fill="#4c1d95" stroke="#a78bfa"/><text x="737" y="181" fill="#c4b5fd">F</text>
  </g>
  <text x="420" y="225" fill="#34d399" font-size="12.5">the inner for-loop IS the level boundary &#8212; no sentinels,</text>
  <text x="420" y="245" fill="#34d399" font-size="12.5">no (node, depth) pairs; emit [B,C] as one level</text>
  <text x="420" y="285" fill="#94a3b8" font-size="12">per-level questions (max, rightmost, zigzag) become</text>
  <text x="420" y="303" fill="#94a3b8" font-size="12">bookkeeping inside the inner loop</text>
</svg>
