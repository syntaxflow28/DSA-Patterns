<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">KAHN'S: PEEL THE ZERO-INDEGREE LAYER, REPEAT</text>
  <line x1="120" y1="115" x2="70"  y2="180" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="140" y1="115" x2="190" y2="180" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="70"  y1="212" x2="120" y2="272" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="190" y1="212" x2="140" y2="272" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <circle cx="130" cy="100" r="17" fill="#f59e0b"/><text x="130" y="105" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">0</text>
  <circle cx="70"  cy="196" r="17" fill="#3b82f6"/><text x="70"  y="201" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="190" cy="196" r="17" fill="#3b82f6"/><text x="190" y="201" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">2</text>
  <circle cx="130" cy="290" r="17" fill="#a78bfa"/><text x="130" y="295" fill="#1e1b4b" font-size="13" font-weight="bold" text-anchor="middle">3</text>
  <g font-size="10.5" fill="#94a3b8" font-family="Consolas, monospace">
    <text x="158" y="95">in: 0</text>
    <text x="20"  y="200">in: 1</text>
    <text x="215" y="200">in: 1</text>
    <text x="158" y="295">in: 2</text>
  </g>

  <text x="330" y="100" fill="#e2e8f0" font-size="13" font-weight="bold">peel rounds:</text>
  <g font-size="13" font-family="Consolas, monospace">
    <text x="330" y="132" fill="#f59e0b">round 1: {0}</text><text x="530" y="132" fill="#94a3b8">only zero-indegree node</text>
    <text x="330" y="162" fill="#60a5fa">round 2: {1, 2}</text><text x="530" y="162" fill="#94a3b8">0's edges removed &#8594; both drop to 0</text>
    <text x="330" y="192" fill="#a78bfa">round 3: {3}</text><text x="530" y="192" fill="#94a3b8">2 &#8594; 1 &#8594; 0: last to free up</text>
  </g>
  <text x="330" y="235" fill="#34d399" font-size="12.5">emit order 0,1,2,3 &#8212; prerequisites always precede dependents,</text>
  <text x="330" y="255" fill="#34d399" font-size="12.5">because a node enters the queue only when its indegree hits 0</text>
  <text x="330" y="295" fill="#f87171" font-size="12.5">cycle detection for free: processed count &#60; n at the end &#8658;</text>
  <text x="330" y="313" fill="#f87171" font-size="12.5">a cycle held some indegrees above 0 forever</text>
</svg>
