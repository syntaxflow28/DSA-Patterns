<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">ONLY VIABLE PREFIXES ARE EXTENDED (n = 2)</text>
  <line x1="240" y1="96"  x2="240" y2="128" stroke="#64748b" stroke-width="1.8"/>
  <line x1="255" y1="90"  x2="345" y2="120" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5 4"/>
  <line x1="225" y1="158" x2="160" y2="192" stroke="#64748b" stroke-width="1.8"/>
  <line x1="255" y1="158" x2="320" y2="192" stroke="#64748b" stroke-width="1.8"/>
  <line x1="145" y1="222" x2="90"  y2="252" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5 4"/>
  <line x1="160" y1="224" x2="160" y2="252" stroke="#64748b" stroke-width="1.8"/>
  <line x1="320" y1="224" x2="320" y2="252" stroke="#64748b" stroke-width="1.8"/>
  <line x1="160" y1="284" x2="160" y2="312" stroke="#64748b" stroke-width="1.8"/>
  <line x1="320" y1="284" x2="320" y2="312" stroke="#64748b" stroke-width="1.8"/>
  <g font-size="12.5" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="210" y="64"  width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="240" y="85"  fill="#e2e8f0">&#8220;&#8221;</text>
    <rect x="210" y="128" width="60" height="30" rx="8" fill="#1e293b" stroke="#334155"/><text x="240" y="148" fill="#e2e8f0">(</text>
    <rect x="345" y="110" width="60" height="30" rx="8" fill="#1e293b" stroke="#f87171"/><text x="375" y="130" fill="#f87171">)</text>
    <rect x="130" y="192" width="60" height="30" rx="8" fill="#1e293b" stroke="#334155"/><text x="160" y="212" fill="#e2e8f0">((</text>
    <rect x="290" y="192" width="60" height="30" rx="8" fill="#1e293b" stroke="#334155"/><text x="320" y="212" fill="#e2e8f0">()</text>
    <rect x="45"  y="252" width="66" height="30" rx="8" fill="#1e293b" stroke="#f87171"/><text x="78"  y="272" fill="#f87171">(((</text>
    <rect x="130" y="252" width="60" height="30" rx="8" fill="#1e293b" stroke="#334155"/><text x="160" y="272" fill="#e2e8f0">(()</text>
    <rect x="290" y="252" width="60" height="30" rx="8" fill="#1e293b" stroke="#334155"/><text x="320" y="272" fill="#e2e8f0">()(</text>
    <rect x="122" y="312" width="76" height="30" rx="8" fill="#14532d" stroke="#34d399"/><text x="160" y="332" fill="#86efac">(())</text>
    <rect x="282" y="312" width="76" height="30" rx="8" fill="#14532d" stroke="#34d399"/><text x="320" y="332" fill="#86efac">()()</text>
  </g>
  <text x="352" y="95"  fill="#f87171" font-size="11">close &#60; open fails</text>
  <text x="30"  y="240" fill="#f87171" font-size="11">open &#60; n fails</text>

  <text x="500" y="100" fill="#e2e8f0" font-size="13" font-weight="bold">the viability rules ARE the pruning:</text>
  <text x="500" y="132" fill="#60a5fa" font-size="13" font-family="Consolas, monospace">branch '(' iff open &#60; n</text>
  <text x="500" y="160" fill="#60a5fa" font-size="13" font-family="Consolas, monospace">branch ')' iff close &#60; open</text>
  <text x="500" y="205" fill="#94a3b8" font-size="12.5">invalid prefixes are never CONSTRUCTED, so</text>
  <text x="500" y="225" fill="#94a3b8" font-size="12.5">every leaf reached is valid &#8212; the tree has</text>
  <text x="500" y="245" fill="#94a3b8" font-size="12.5">exactly Catalan(n) leaves, zero waste</text>
  <text x="500" y="290" fill="#f87171" font-size="12.5">checking validity only at the leaves gives the</text>
  <text x="500" y="310" fill="#f87171" font-size="12.5">same output while exploring 2^(2n) prefixes &#8212;</text>
  <text x="500" y="330" fill="#f87171" font-size="12.5">correct, and exponentially slower</text>
</svg>
