<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">THE EXPLICIT STACK = THE LEFT SPINE (iterative in-order)</text>
  <line x1="190" y1="100" x2="120" y2="180" stroke="#f59e0b" stroke-width="3"/>
  <line x1="190" y1="100" x2="260" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="120" y1="180" x2="70"  y2="260" stroke="#f59e0b" stroke-width="3"/>
  <line x1="120" y1="180" x2="170" y2="260" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="190" cy="100" r="17" fill="#f59e0b"/><text x="190" y="105" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">4</text>
  <circle cx="120" cy="180" r="17" fill="#f59e0b"/><text x="120" y="185" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">2</text>
  <circle cx="260" cy="180" r="17" fill="#3b82f6"/><text x="260" y="185" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">6</text>
  <circle cx="70"  cy="260" r="17" fill="#f59e0b"/><text x="70"  y="265" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="170" cy="260" r="17" fill="#3b82f6"/><text x="170" y="265" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">3</text>

  <text x="390" y="80" fill="#94a3b8" font-size="11.5">stack (top first)</text>
  <g font-size="13" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="390" y="92"  width="90" height="32" rx="6" fill="#f59e0b"/><text x="435" y="113" fill="#0f172a">1</text>
    <rect x="390" y="130" width="90" height="32" rx="6" fill="#1e293b" stroke="#334155"/><text x="435" y="151" fill="#e2e8f0">2</text>
    <rect x="390" y="168" width="90" height="32" rx="6" fill="#1e293b" stroke="#334155"/><text x="435" y="189" fill="#e2e8f0">4</text>
  </g>

  <text x="520" y="108" fill="#34d399" font-size="12.5" font-weight="bold">pop = the in-order moment</text>
  <text x="520" y="128" fill="#94a3b8" font-size="12">everything smaller is already out &#8212;</text>
  <text x="520" y="146" fill="#94a3b8" font-size="12">then cur = popped-&#62;right, dive ITS left spine</text>
  <text x="520" y="192" fill="#e2e8f0" font-size="13" font-family="Consolas, monospace">output: 1, 2, 3, 4, 6</text>
  <text x="520" y="235" fill="#60a5fa" font-size="12.5">the stack holds exactly the ancestors whose</text>
  <text x="520" y="255" fill="#60a5fa" font-size="12.5">visit moment hasn't come &#8212; O(h), never O(n)</text>
  <text x="520" y="290" fill="#94a3b8" font-size="12">pause between pops and you've built 173's iterator</text>
</svg>
