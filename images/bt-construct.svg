<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">PRE-ORDER NAMES THE ROOT &#183; IN-ORDER SPLITS THE VALUES (105)</text>
  <text x="40" y="102" fill="#94a3b8" font-size="12.5">pre:</text>
  <g font-size="14" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="90"  y="80" width="44" height="32" rx="6" fill="#f59e0b"/><text x="112" y="101" fill="#0f172a">3</text>
    <rect x="140" y="80" width="44" height="32" rx="6" fill="#1e293b" stroke="#334155"/><text x="162" y="101" fill="#e2e8f0">9</text>
    <rect x="190" y="80" width="44" height="32" rx="6" fill="#1e293b" stroke="#334155"/><text x="212" y="101" fill="#e2e8f0">20</text>
    <rect x="240" y="80" width="44" height="32" rx="6" fill="#1e293b" stroke="#334155"/><text x="262" y="101" fill="#e2e8f0">15</text>
    <rect x="290" y="80" width="44" height="32" rx="6" fill="#1e293b" stroke="#334155"/><text x="312" y="101" fill="#e2e8f0">7</text>
  </g>
  <text x="112" y="70" fill="#f59e0b" font-size="11" text-anchor="middle">root!</text>

  <text x="40" y="172" fill="#94a3b8" font-size="12.5">in:</text>
  <g font-size="14" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="90"  y="150" width="44" height="32" rx="6" fill="#14532d" stroke="#34d399"/><text x="112" y="171" fill="#86efac">9</text>
    <rect x="140" y="150" width="44" height="32" rx="6" fill="#f59e0b"/><text x="162" y="171" fill="#0f172a">3</text>
    <rect x="190" y="150" width="44" height="32" rx="6" fill="#2e1065" stroke="#a78bfa"/><text x="212" y="171" fill="#c4b5fd">15</text>
    <rect x="240" y="150" width="44" height="32" rx="6" fill="#2e1065" stroke="#a78bfa"/><text x="262" y="171" fill="#c4b5fd">20</text>
    <rect x="290" y="150" width="44" height="32" rx="6" fill="#2e1065" stroke="#a78bfa"/><text x="312" y="171" fill="#c4b5fd">7</text>
  </g>
  <text x="90"  y="205" fill="#34d399" font-size="11.5">left subtree</text>
  <text x="230" y="205" fill="#a78bfa" font-size="11.5">right subtree</text>

  <text x="40" y="255" fill="#94a3b8" font-size="12.5">the shared pre pointer is consumed left-subtree-first &#8212;</text>
  <text x="40" y="275" fill="#94a3b8" font-size="12.5">that is WHY you must build left before right</text>
  <text x="40" y="308" fill="#e2e8f0" font-size="12.5" font-family="Consolas, monospace">pos[val] hashmap &#8594; every split found in O(1)</text>

  <line x1="600" y1="110" x2="530" y2="190" stroke="#64748b" stroke-width="1.8"/>
  <line x1="600" y1="110" x2="670" y2="190" stroke="#64748b" stroke-width="1.8"/>
