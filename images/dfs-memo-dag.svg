<svg xmlns="http://www.w3.org/2000/svg" width="880" height="310" viewBox="0 0 880 310" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="310" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">NAIVE: RECURSION TREE</text>
  <line x1="120" y1="94" x2="60"  y2="146" stroke="#64748b" stroke-width="1.6"/>
  <line x1="120" y1="94" x2="160" y2="146" stroke="#64748b" stroke-width="1.6"/>
  <line x1="120" y1="94" x2="260" y2="146" stroke="#64748b" stroke-width="1.6"/>
  <line x1="60"  y1="174" x2="40"  y2="226" stroke="#64748b" stroke-width="1.6"/>
  <line x1="60"  y1="174" x2="120" y2="226" stroke="#64748b" stroke-width="1.6"/>
  <g font-size="12.5" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="88"  y="66"  width="64" height="28" rx="8" fill="#1e293b" stroke="#334155"/><text x="120" y="85"  fill="#e2e8f0">dfs(0)</text>
    <rect x="28"  y="146" width="64" height="28" rx="8" fill="#1e293b" stroke="#334155"/><text x="60"  y="165" fill="#e2e8f0">dfs(1)</text>
    <rect x="128" y="146" width="64" height="28" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="2"/><text x="160" y="165" fill="#f87171">dfs(2)</text>
    <rect x="228" y="146" width="64" height="28" rx="8" fill="#1e293b" stroke="#334155"/><text x="260" y="165" fill="#e2e8f0">dfs(4)</text>
    <rect x="8"   y="226" width="64" height="28" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="2"/><text x="40"  y="245" fill="#f87171">dfs(2)</text>
    <rect x="88"  y="226" width="64" height="28" rx="8" fill="#1e293b" stroke="#334155"/><text x="120" y="245" fill="#e2e8f0">dfs(3)</text>
  </g>
  <text x="40" y="292" fill="#f87171" font-size="12.5">same arguments, recomputed in different branches &#8594; exponential</text>

  <text x="480" y="45" fill="#f8fafc" font-size="14" font-weight="bold">MEMOIZED: THE DAG OF DISTINCT STATES</text>
  <line x1="540" y1="150" x2="580" y2="150" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="620" y1="150" x2="660" y2="150" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="700" y1="150" x2="740" y2="150" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="780" y1="150" x2="812" y2="150" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <path d="M 522,133 C 555,88 645,88 678,131" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ar)"/>
  <path d="M 602,168 C 635,212 725,212 758,171" fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#ar)"/>
  <g font-size="13" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <circle cx="520" cy="150" r="19" fill="#3b82f6"/><text x="520" y="155" fill="#fff">0</text>
    <circle cx="600" cy="150" r="19" fill="#3b82f6"/><text x="600" y="155" fill="#fff">1</text>
    <circle cx="680" cy="150" r="19" fill="#3b82f6"/><text x="680" y="155" fill="#fff">2</text>
    <circle cx="760" cy="150" r="19" fill="#3b82f6"/><text x="760" y="155" fill="#fff">3</text>
    <circle cx="830" cy="150" r="16" fill="none" stroke="#475569"/><text x="830" y="155" fill="#94a3b8">&#8230;</text>
  </g>
  <text x="480" y="255" fill="#94a3b8" font-size="12.5">nodes = distinct arguments; revisits become O(1) lookups</text>
  <text x="480" y="283" fill="#60a5fa" font-size="13" font-weight="bold">complexity = O(states &#215; work-per-state) &#8212; count the DAG, not the tree</text>
</svg>
