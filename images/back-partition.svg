<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">LEVEL = WHERE THE NEXT CUT GOES (&#8220;aab&#8221;, palindromic pieces)</text>
  <!-- nodes show the REMAINING string -->
  <line x1="165" y1="105" x2="95"  y2="165" stroke="#64748b" stroke-width="1.8"/>
  <line x1="185" y1="105" x2="255" y2="165" stroke="#64748b" stroke-width="1.8"/>
  <line x1="195" y1="95"  x2="345" y2="150" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5 4"/>
  <line x1="95"  y1="197" x2="95"  y2="252" stroke="#64748b" stroke-width="1.8"/>
  <line x1="115" y1="190" x2="185" y2="245" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5 4"/>
  <line x1="255" y1="197" x2="255" y2="252" stroke="#64748b" stroke-width="1.8"/>
  <line x1="95"  y1="284" x2="95"  y2="310" stroke="#64748b" stroke-width="1.8"/>
  <g font-size="12.5" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="135" y="73"  width="80" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="175" y="94"  fill="#e2e8f0">&#8220;aab&#8221;</text>
    <rect x="60"  y="165" width="70" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="95"  y="186" fill="#e2e8f0">&#8220;ab&#8221;</text>
    <rect x="220" y="165" width="70" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="255" y="186" fill="#e2e8f0">&#8220;b&#8221;</text>
    <rect x="345" y="150" width="60" height="30" rx="8" fill="#1e293b" stroke="#f87171"/><text x="375" y="170" fill="#f87171">&#8709;</text>
    <rect x="60"  y="252" width="70" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="95"  y="273" fill="#e2e8f0">&#8220;b&#8221;</text>
    <rect x="185" y="245" width="60" height="30" rx="8" fill="#1e293b" stroke="#f87171"/><text x="215" y="265" fill="#f87171">&#8709;</text>
    <rect x="220" y="252" width="70" height="32" rx="8" fill="#14532d" stroke="#34d399"/><text x="255" y="273" fill="#86efac">done</text>
    <rect x="60"  y="310" width="70" height="32" rx="8" fill="#14532d" stroke="#34d399"/><text x="95"  y="331" fill="#86efac">done</text>
  </g>
  <text x="105" y="140" fill="#34d399" font-size="11">cut &#8220;a&#8221; &#10003;</text>
  <text x="228" y="140" fill="#34d399" font-size="11">cut &#8220;aa&#8221; &#10003;</text>
  <text x="300" y="128" fill="#f87171" font-size="11">&#8220;aab&#8221; not pal &#10007;</text>
  <text x="105" y="228" fill="#34d399" font-size="11">&#8220;a&#8221; &#10003;</text>
  <text x="165" y="218" fill="#f87171" font-size="11">&#8220;ab&#8221; &#10007;</text>
  <text x="268" y="228" fill="#34d399" font-size="11">&#8220;b&#8221; &#10003;</text>
  <text x="107" y="300" fill="#34d399" font-size="11">&#8220;b&#8221; &#10003;</text>

  <text x="490" y="105" fill="#e2e8f0" font-size="13" font-weight="bold">a partition &#8660; a set of cut positions,</text>
  <text x="490" y="125" fill="#e2e8f0" font-size="13" font-weight="bold">so enumerating cuts enumerates partitions</text>
  <text x="490" y="165" fill="#34d399" font-size="12.5">legality (is the piece a palindrome?) is tested</text>
  <text x="490" y="185" fill="#34d399" font-size="12.5">BEFORE descending &#8212; dead pieces prune subtrees</text>
  <text x="490" y="225" fill="#e2e8f0" font-size="12.5" font-family="Consolas, monospace">answers: [a | a | b]   [aa | b]</text>
  <text x="490" y="262" fill="#94a3b8" font-size="12">emit only at remaining = &#8220;&#8221; (everything consumed) &#8212;</text>
  <text x="490" y="280" fill="#94a3b8" font-size="12">emitting when the path merely &#8220;looks big enough&#8221;</text>
  <text x="490" y="298" fill="#94a3b8" font-size="12">silently drops trailing characters</text>
</svg>
