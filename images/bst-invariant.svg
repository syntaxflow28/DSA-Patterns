<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">THE INVARIANT IS GLOBAL &#8212; AND IN-ORDER LINEARIZES IT</text>
  <line x1="260" y1="95"  x2="160" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="260" y1="95"  x2="360" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="160" y1="175" x2="90"  y2="255" stroke="#64748b" stroke-width="1.8"/>
  <line x1="160" y1="175" x2="230" y2="255" stroke="#64748b" stroke-width="1.8"/>
  <line x1="360" y1="175" x2="430" y2="255" stroke="#64748b" stroke-width="1.8"/>
  <line x1="230" y1="255" x2="290" y2="330" stroke="#f87171" stroke-width="2" stroke-dasharray="6 4"/>
  <circle cx="260" cy="95"  r="17" fill="#3b82f6"/><text x="260" y="100" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">8</text>
  <circle cx="160" cy="175" r="17" fill="#3b82f6"/><text x="160" y="180" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">3</text>
  <circle cx="360" cy="175" r="17" fill="#3b82f6"/><text x="360" y="180" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">10</text>
  <circle cx="90"  cy="255" r="17" fill="#3b82f6"/><text x="90"  y="260" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="230" cy="255" r="17" fill="#3b82f6"/><text x="230" y="260" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">6</text>
  <circle cx="430" cy="255" r="17" fill="#3b82f6"/><text x="430" y="260" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">14</text>
  <circle cx="290" cy="330" r="17" fill="#7f1d1d" stroke="#f87171" stroke-width="2"/><text x="290" y="335" fill="#fecaca" font-size="13" font-weight="bold" text-anchor="middle">9</text>
  <g font-size="10.5" fill="#94a3b8" font-family="Consolas, monospace">
    <text x="185" y="168">(&#8722;&#8734;, 8)</text>
    <text x="385" y="168">(8, +&#8734;)</text>
    <text x="255" y="248">(3, 8)</text>
  </g>
  <text x="330" y="325" fill="#f87171" font-size="12">9 &#62; parent 6 &#10003;  but 9 &#62; root 8 &#10007;</text>
  <text x="330" y="345" fill="#f87171" font-size="12">the bound must travel DOWN &#8212; local checks lie</text>

  <text x="560" y="100" fill="#34d399" font-size="13" font-weight="bold">in-order = sorted, always:</text>
  <text x="560" y="130" fill="#e2e8f0" font-size="14" font-family="Consolas, monospace">1  3  6  8  10  14</text>
  <text x="560" y="168" fill="#94a3b8" font-size="12">left block &#60; node &#60; right block,</text>
  <text x="560" y="186" fill="#94a3b8" font-size="12">recursively &#8658; the walk emits ascending</text>
  <text x="560" y="204" fill="#94a3b8" font-size="12">order &#8212; a sorted array wearing pointers</text>
  <text x="560" y="248" fill="#60a5fa" font-size="12.5">&#8230;and any comparison at a node routes</text>
  <text x="560" y="268" fill="#60a5fa" font-size="12.5">you into ONE subtree: O(h) search,</text>
  <text x="560" y="288" fill="#60a5fa" font-size="12.5">insert, delete, LCA (Patterns 2&#8211;3)</text>
</svg>
