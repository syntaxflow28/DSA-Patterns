<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#34d399"/></marker>
    <marker id="arAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="400" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">THE DECISION TREE (subsets of [1,2]) &#8212; EVERY NODE IS A SOLUTION</text>
  <line x1="185" y1="112" x2="120" y2="180" stroke="#34d399" stroke-width="2" marker-end="url(#arGreen)"/>
  <line x1="215" y1="112" x2="280" y2="180" stroke="#34d399" stroke-width="2" marker-end="url(#arGreen)"/>
  <line x1="120" y1="212" x2="120" y2="278" stroke="#34d399" stroke-width="2" marker-end="url(#arGreen)"/>
  <path d="M 100,278 C 80,240 82,220 98,213" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arAmber)"/>
  <g font-size="13" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="160" y="80"  width="80" height="32" rx="8" fill="#1e293b" stroke="#34d399"/><text x="200" y="101" fill="#e2e8f0">[]</text>
    <rect x="80"  y="180" width="80" height="32" rx="8" fill="#1e293b" stroke="#34d399"/><text x="120" y="201" fill="#e2e8f0">[1]</text>
    <rect x="240" y="180" width="80" height="32" rx="8" fill="#1e293b" stroke="#34d399"/><text x="280" y="201" fill="#e2e8f0">[2]</text>
    <rect x="80"  y="278" width="80" height="32" rx="8" fill="#1e293b" stroke="#34d399"/><text x="120" y="299" fill="#e2e8f0">[1,2]</text>
  </g>
  <text x="130" y="140" fill="#34d399" font-size="11">push 1</text>
  <text x="256" y="140" fill="#34d399" font-size="11">push 2</text>
  <text x="132" y="250" fill="#34d399" font-size="11">push 2</text>
  <text x="30"  y="250" fill="#f59e0b" font-size="11">pop 2</text>
  <text x="40" y="360" fill="#94a3b8" font-size="12.5">4 nodes = the 4 subsets &#8212; each reached by exactly ONE choice</text>
  <text x="40" y="380" fill="#94a3b8" font-size="12.5">sequence: complete and duplicate-free BY CONSTRUCTION</text>

  <text x="470" y="90" fill="#e2e8f0" font-size="13" font-weight="bold">one shared buffer, kept in sync with the stack:</text>
  <g font-size="13" font-family="Consolas, monospace">
    <text x="470" y="125" fill="#34d399">path.push_back(1);</text><text x="680" y="125" fill="#94a3b8">// choose</text>
    <text x="470" y="152" fill="#e2e8f0">  dfs(next);</text><text x="680" y="152" fill="#94a3b8">// explore</text>
    <text x="470" y="179" fill="#f59e0b">path.pop_back();</text><text x="680" y="179" fill="#94a3b8">// unchoose</text>
  </g>
  <text x="470" y="225" fill="#94a3b8" font-size="12.5">whatever is mutated on the way in is restored on the</text>
  <text x="470" y="245" fill="#94a3b8" font-size="12.5">way out, EXACTLY &#8212; the buffer always equals the</text>
  <text x="470" y="265" fill="#94a3b8" font-size="12.5">root-to-here choice path</text>
  <text x="470" y="310" fill="#f87171" font-size="12.5">an early return/continue between push and pop</text>
  <text x="470" y="330" fill="#f87171" font-size="12.5">corrupts every branch that follows &#8212; make the</text>
  <text x="470" y="350" fill="#f87171" font-size="12.5">undo structurally unskippable</text>
</svg>
