<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">LEVER 1: START INDEX &#8212; NEVER LOOK BACK</text>
  <line x1="150" y1="112" x2="70"  y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="150" y1="112" x2="150" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="150" y1="112" x2="230" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="150" y1="207" x2="230" y2="255" stroke="#64748b" stroke-width="1.8"/>
  <line x1="150" y1="207" x2="80"  y2="255" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5 4"/>
  <g font-size="13" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="120" y="80"  width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="150" y="101" fill="#e2e8f0">[]</text>
    <rect x="40"  y="175" width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="70"  y="196" fill="#e2e8f0">[1]</text>
    <rect x="120" y="175" width="60" height="32" rx="8" fill="#f59e0b"/><text x="150" y="196" fill="#0f172a">[2]</text>
    <rect x="200" y="175" width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="230" y="196" fill="#e2e8f0">[3]</text>
    <rect x="200" y="255" width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="230" y="276" fill="#e2e8f0">[2,3]</text>
    <rect x="50"  y="255" width="60" height="32" rx="8" fill="#1e293b" stroke="#f87171"/><text x="80"  y="276" fill="#f87171">[2,1]</text>
  </g>
  <text x="40" y="315" fill="#94a3b8" font-size="12">after choosing 2 (index 1), only indices &#62; 1 remain &#8212;</text>
  <text x="40" y="333" fill="#94a3b8" font-size="12">{1,2} is built exactly once, as 1&#8594;2. order made irrelevant</text>
  <text x="96" y="243" fill="#f87171" font-size="13" font-weight="bold">&#10007;</text>

  <text x="470" y="45" fill="#f8fafc" font-size="14" font-weight="bold">LEVER 2: SORT + SKIP EQUAL SIBLINGS ([1,2,2&#8242;])</text>
  <line x1="600" y1="112" x2="520" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="600" y1="112" x2="600" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="600" y1="112" x2="680" y2="175" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5 4"/>
  <line x1="600" y1="207" x2="600" y2="255" stroke="#64748b" stroke-width="1.8"/>
  <g font-size="13" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="570" y="80"  width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="600" y="101" fill="#e2e8f0">[]</text>
    <rect x="490" y="175" width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="520" y="196" fill="#e2e8f0">[1]</text>
    <rect x="570" y="175" width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="600" y="196" fill="#e2e8f0">[2]</text>
    <rect x="650" y="175" width="60" height="32" rx="8" fill="#1e293b" stroke="#f87171"/><text x="680" y="196" fill="#f87171">[2&#8242;]</text>
    <rect x="570" y="255" width="60" height="32" rx="8" fill="#1e293b" stroke="#34d399"/><text x="600" y="276" fill="#34d399">[2,2&#8242;]</text>
  </g>
  <text x="700" y="150" fill="#f87171" font-size="11.5">i &#62; start &#38;&#38;</text>
  <text x="700" y="166" fill="#f87171" font-size="11.5">a[i]==a[i-1] &#8594; skip</text>
  <text x="470" y="315" fill="#94a3b8" font-size="12">equal SIBLINGS skipped (the later copy never leads) &#8212; but</text>
  <text x="470" y="333" fill="#94a3b8" font-size="12">parent&#8594;child [2,2&#8242;] survives: {2,2} is still produced once</text>
</svg>
