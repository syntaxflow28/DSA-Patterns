<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">MEET IN THE MIDDLE &#8212; TWO SMALL BALLS BEAT ONE BIG ONE</text>
  <circle cx="200" cy="170" r="90" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.5"/>
  <circle cx="200" cy="170" r="60" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.7"/>
  <circle cx="200" cy="170" r="30" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
  <circle cx="380" cy="170" r="90" fill="none" stroke="#f472b6" stroke-width="1.2" opacity="0.5"/>
  <circle cx="380" cy="170" r="60" fill="none" stroke="#f472b6" stroke-width="1.2" opacity="0.7"/>
  <circle cx="380" cy="170" r="30" fill="none" stroke="#f472b6" stroke-width="1.2"/>
  <circle cx="200" cy="170" r="9" fill="#3b82f6"/><text x="200" y="145" fill="#93c5fd" font-size="12.5" font-weight="bold" text-anchor="middle">S</text>
  <circle cx="380" cy="170" r="9" fill="#f472b6"/><text x="380" y="145" fill="#f9a8d4" font-size="12.5" font-weight="bold" text-anchor="middle">T</text>
  <circle cx="290" cy="170" r="8" fill="#34d399"/>
  <text x="290" y="203" fill="#34d399" font-size="12" font-weight="bold" text-anchor="middle">meet!</text>
  <text x="60" y="285" fill="#94a3b8" font-size="12">frontiers of radius d/2 each &#8212; a node in BOTH sets ends the search</text>

  <text x="530" y="95" fill="#e2e8f0" font-size="13" font-weight="bold">the volume argument (branching b, distance d):</text>
  <g font-size="13" font-family="Consolas, monospace">
    <text x="530" y="130" fill="#f87171">one-sided:      b^d</text>
    <text x="530" y="158" fill="#34d399">bidirectional:  2 &#183; b^(d/2)</text>
    <text x="530" y="186" fill="#94a3b8">b=10, d=6:  1,000,000 vs 2,000</text>
  </g>
  <text x="530" y="230" fill="#f59e0b" font-size="12.5">always expand the SMALLER frontier each round;</text>
  <text x="530" y="250" fill="#f59e0b" font-size="12.5">store frontiers as hash sets &#8212; the meet test is</text>
  <text x="530" y="270" fill="#f59e0b" font-size="12.5">membership in the other side</text>
</svg>
