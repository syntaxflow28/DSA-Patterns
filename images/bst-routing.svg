<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#34d399"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">LCA OF A BST = THE SPLIT POINT (235) &#8212; p = 1, q = 6</text>
  <line x1="260" y1="100" x2="160" y2="180" stroke="#60a5fa" stroke-width="4"/>
  <line x1="260" y1="100" x2="360" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="149" y1="196" x2="98"  y2="242" stroke="#34d399" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arGreen)"/>
  <line x1="171" y1="196" x2="222" y2="242" stroke="#34d399" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arGreen)"/>
  <line x1="360" y1="180" x2="430" y2="260" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="260" cy="100" r="17" fill="#3b82f6"/><text x="260" y="105" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">8</text>
  <circle cx="160" cy="180" r="17" fill="#f59e0b"/><text x="160" y="185" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">3</text>
  <circle cx="360" cy="180" r="17" fill="#3b82f6"/><text x="360" y="185" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">10</text>
  <circle cx="90"  cy="260" r="17" fill="#34d399"/><text x="90"  y="265" fill="#052e16" font-size="13" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="230" cy="260" r="17" fill="#34d399"/><text x="230" y="265" fill="#052e16" font-size="13" font-weight="bold" text-anchor="middle">6</text>
  <circle cx="430" cy="260" r="17" fill="#3b82f6"/><text x="430" y="265" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">14</text>
  <text x="290" y="100" fill="#60a5fa" font-size="11.5">1 &#60; 8 and 6 &#60; 8 &#8594; both LEFT</text>
  <text x="195" y="168" fill="#f59e0b" font-size="11.5">1 &#60; 3 but 6 &#62; 3 &#8594; SPLIT &#8658; LCA</text>

  <text x="560" y="110" fill="#e2e8f0" font-size="12.5">descend while both targets route the</text>
  <text x="560" y="130" fill="#e2e8f0" font-size="12.5">same side; the first divergence is the LCA</text>
  <text x="560" y="168" fill="#34d399" font-size="12.5" font-weight="bold">O(h), iterative, top-down &#8212;</text>
  <text x="560" y="188" fill="#34d399" font-size="12.5" font-weight="bold">no post-order argument needed (contrast 236)</text>
  <text x="560" y="228" fill="#f87171" font-size="12">equality terminates, not routes: if the node</text>
  <text x="560" y="246" fill="#f87171" font-size="12">equals p or q, that node IS the answer</text>
  <text x="560" y="282" fill="#94a3b8" font-size="12">same one-sided descent = search (700), insert (701)</text>
</svg>
