<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">DELETE WITH TWO CHILDREN (450) &#8212; delete 3</text>
  <line x1="180" y1="100" x2="110" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="180" y1="100" x2="250" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="110" y1="180" x2="50"  y2="260" stroke="#64748b" stroke-width="1.8"/>
  <line x1="110" y1="180" x2="170" y2="260" stroke="#64748b" stroke-width="1.8"/>
  <line x1="170" y1="260" x2="130" y2="335" stroke="#64748b" stroke-width="1.8"/>
  <line x1="170" y1="260" x2="210" y2="335" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="180" cy="100" r="17" fill="#3b82f6"/><text x="180" y="105" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">8</text>
  <circle cx="110" cy="180" r="17" fill="#7f1d1d" stroke="#f87171" stroke-width="2"/><text x="110" y="185" fill="#fecaca" font-size="13" font-weight="bold" text-anchor="middle">3</text>
  <circle cx="250" cy="180" r="17" fill="#3b82f6"/><text x="250" y="185" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">10</text>
  <circle cx="50"  cy="260" r="17" fill="#3b82f6"/><text x="50"  y="265" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="170" cy="260" r="17" fill="#3b82f6"/><text x="170" y="265" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">6</text>
  <circle cx="130" cy="335" r="17" fill="#14532d" stroke="#34d399" stroke-width="2"/><text x="130" y="340" fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">4</text>
  <circle cx="210" cy="335" r="17" fill="#3b82f6"/><text x="210" y="340" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">7</text>
  <text x="55" y="150" fill="#f87171" font-size="11.5">delete me</text>
  <text x="60" y="345" fill="#34d399" font-size="11.5" text-anchor="end">successor:</text>
  <text x="60" y="361" fill="#34d399" font-size="11.5" text-anchor="end">leftmost of</text>

  <line x1="310" y1="210" x2="360" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>

  <line x1="500" y1="100" x2="430" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="500" y1="100" x2="570" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="430" y1="180" x2="370" y2="260" stroke="#64748b" stroke-width="1.8"/>
  <line x1="430" y1="180" x2="490" y2="260" stroke="#64748b" stroke-width="1.8"/>
  <line x1="490" y1="260" x2="530" y2="335" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="500" cy="100" r="17" fill="#3b82f6"/><text x="500" y="105" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">8</text>
  <circle cx="430" cy="180" r="17" fill="#14532d" stroke="#34d399" stroke-width="2"/><text x="430" y="185" fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">4</text>
  <circle cx="570" cy="180" r="17" fill="#3b82f6"/><text x="570" y="185" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">10</text>
  <circle cx="370" cy="260" r="17" fill="#3b82f6"/><text x="370" y="265" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="490" cy="260" r="17" fill="#3b82f6"/><text x="490" y="265" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">6</text>
  <circle cx="530" cy="335" r="17" fill="#3b82f6"/><text x="530" y="340" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">7</text>
  <text x="455" y="150" fill="#34d399" font-size="11.5">4 copied up</text>

  <text x="650" y="110" fill="#34d399" font-size="12.5" font-weight="bold">the successor is a LEFTMOST node</text>
  <text x="650" y="130" fill="#34d399" font-size="12.5" font-weight="bold">&#8658; it has no left child</text>
  <text x="650" y="158" fill="#94a3b8" font-size="12">&#8658; deleting IT is the easy splice case &#8212;</text>
  <text x="650" y="176" fill="#94a3b8" font-size="12">the hard case reduces to the easy</text>
  <text x="650" y="194" fill="#94a3b8" font-size="12">one, exactly once</text>
  <g font-size="12" font-family="Consolas, monospace" fill="#e2e8f0">
    <text x="650" y="240">root-&#62;val = succ-&#62;val;</text>
    <text x="650" y="262">root-&#62;right =</text>
    <text x="650" y="284">  deleteNode(root-&#62;right,</text>
    <text x="650" y="306">             succ-&#62;val);</text>
  </g>
  <text x="650" y="345" fill="#f87171" font-size="12">forget `root-&#62;left/right =` and the</text>
  <text x="650" y="363" fill="#f87171" font-size="12">mutation silently vanishes</text>
</svg>
