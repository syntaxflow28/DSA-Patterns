<svg xmlns="http://www.w3.org/2000/svg" width="880" height="350" viewBox="0 0 880 350" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="350" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">TOP-TWO ARMS AT EVERY NODE</text>
  <line x1="150" y1="95"  x2="90"  y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="150" y1="95"  x2="210" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="90"  y1="175" x2="50"  y2="255" stroke="#34d399" stroke-width="3.5"/>
  <line x1="90"  y1="175" x2="130" y2="255" stroke="#34d399" stroke-width="3.5"/>
  <circle cx="150" cy="95"  r="16" fill="#3b82f6"/><text x="150" y="100" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">0</text>
  <circle cx="90"  cy="175" r="16" fill="#34d399"/><text x="90"  y="180" fill="#052e16" font-size="13" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="210" cy="175" r="16" fill="#3b82f6"/><text x="210" y="180" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">2</text>
  <circle cx="50"  cy="255" r="16" fill="#3b82f6"/><text x="50"  y="260" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">3</text>
  <circle cx="130" cy="255" r="16" fill="#3b82f6"/><text x="130" y="260" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">4</text>
  <text x="40" y="305" fill="#34d399" font-size="12.5">best bend at node 1: top1 + top2 = 1 + 1 = 2  (path 3&#8211;1&#8211;4)</text>
  <text x="40" y="328" fill="#94a3b8" font-size="12.5">(v != parent) replaces the visited set &#8212; tree paths are unique</text>

  <text x="440" y="45" fill="#f8fafc" font-size="14" font-weight="bold">REROOTING: EVERY ROOT'S ANSWER IN O(n) TOTAL</text>
  <!-- tree rooted at 0 -->
  <line x1="490" y1="105" x2="450" y2="175" stroke="#64748b" stroke-width="1.6"/>
  <line x1="490" y1="105" x2="530" y2="175" stroke="#64748b" stroke-width="1.6"/>
  <line x1="450" y1="175" x2="420" y2="245" stroke="#64748b" stroke-width="1.6"/>
  <line x1="450" y1="175" x2="480" y2="245" stroke="#64748b" stroke-width="1.6"/>
  <circle cx="490" cy="105" r="14" fill="#3b82f6"/><text x="490" y="110" fill="#fff" font-size="11.5" font-weight="bold" text-anchor="middle">0</text>
  <circle cx="450" cy="175" r="14" fill="#60a5fa"/><text x="450" y="180" fill="#0f172a" font-size="11.5" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="530" cy="175" r="14" fill="#3b82f6"/><text x="530" y="180" fill="#fff" font-size="11.5" font-weight="bold" text-anchor="middle">2</text>
  <circle cx="420" cy="245" r="14" fill="#60a5fa"/><text x="420" y="250" fill="#0f172a" font-size="11.5" font-weight="bold" text-anchor="middle">3</text>
  <circle cx="480" cy="245" r="14" fill="#60a5fa"/><text x="480" y="250" fill="#0f172a" font-size="11.5" font-weight="bold" text-anchor="middle">4</text>
  <line x1="572" y1="175" x2="614" y2="175" stroke="#94a3b8" stroke-width="2" marker-end="url(#ar)"/>
  <text x="570" y="160" fill="#94a3b8" font-size="11.5">reroot 0&#8594;1</text>
  <!-- tree rooted at 1 -->
  <line x1="700" y1="105" x2="640" y2="175" stroke="#64748b" stroke-width="1.6"/>
  <line x1="700" y1="105" x2="700" y2="175" stroke="#64748b" stroke-width="1.6"/>
  <line x1="700" y1="105" x2="760" y2="175" stroke="#64748b" stroke-width="1.6"/>
  <line x1="760" y1="175" x2="760" y2="245" stroke="#64748b" stroke-width="1.6"/>
  <circle cx="700" cy="105" r="14" fill="#60a5fa"/><text x="700" y="110" fill="#0f172a" font-size="11.5" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="640" cy="175" r="14" fill="#60a5fa"/><text x="640" y="180" fill="#0f172a" font-size="11.5" font-weight="bold" text-anchor="middle">3</text>
  <circle cx="700" cy="175" r="14" fill="#60a5fa"/><text x="700" y="180" fill="#0f172a" font-size="11.5" font-weight="bold" text-anchor="middle">4</text>
  <circle cx="760" cy="175" r="14" fill="#3b82f6"/><text x="760" y="180" fill="#fff" font-size="11.5" font-weight="bold" text-anchor="middle">0</text>
  <circle cx="760" cy="245" r="14" fill="#3b82f6"/><text x="760" y="250" fill="#fff" font-size="11.5" font-weight="bold" text-anchor="middle">2</text>

  <text x="440" y="292" fill="#60a5fa" font-size="12.5">subtree(1) = {1,3,4}: each 1 CLOSER</text>
  <text x="660" y="292" fill="#f59e0b" font-size="12.5">rest {0,2}: each 1 FARTHER</text>
  <text x="440" y="322" fill="#e2e8f0" font-size="14" font-family="Consolas, monospace">ans[1] = ans[0] &#8722; size[1] + (n &#8722; size[1]) = ans[0] + n &#8722; 2&#183;size[1]</text>
</svg>
