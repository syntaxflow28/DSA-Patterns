<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#34d399"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">IN-PLACE MARKING (79) &#8212; searching &#8220;CAT&#8221;, mid-exploration</text>
  <g font-size="15" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="60"  y="70"  width="46" height="46" rx="8" fill="#78350f" stroke="#f59e0b"/><text x="83"  y="99"  fill="#fcd34d">#</text>
    <rect x="112" y="70"  width="46" height="46" rx="8" fill="#78350f" stroke="#f59e0b"/><text x="135" y="99"  fill="#fcd34d">#</text>
    <rect x="164" y="70"  width="46" height="46" rx="8" fill="#1e293b" stroke="#334155"/><text x="187" y="99"  fill="#64748b">B</text>
    <rect x="60"  y="122" width="46" height="46" rx="8" fill="#1e293b" stroke="#334155"/><text x="83"  y="151" fill="#64748b">X</text>
    <rect x="112" y="122" width="46" height="46" rx="8" fill="#14532d" stroke="#34d399" stroke-width="2"/><text x="135" y="151" fill="#86efac">T</text>
    <rect x="164" y="122" width="46" height="46" rx="8" fill="#1e293b" stroke="#334155"/><text x="187" y="151" fill="#64748b">X</text>
  </g>
  <text x="83"  y="63" fill="#94a3b8" font-size="10.5" text-anchor="middle">was C</text>
  <text x="135" y="63" fill="#94a3b8" font-size="10.5" text-anchor="middle">was A</text>
  <line x1="88"  y1="93" x2="106" y2="93"  stroke="#34d399" stroke-width="2" marker-end="url(#arGreen)"/>
  <line x1="135" y1="118" x2="135" y2="120" stroke="#34d399" stroke-width="2" marker-end="url(#arGreen)"/>
  <text x="240" y="100" fill="#f59e0b" font-size="12.5"># = on the current path &#8212; the board</text>
  <text x="240" y="120" fill="#f59e0b" font-size="12.5">itself records the choice, so the path</text>
  <text x="240" y="140" fill="#f59e0b" font-size="12.5">can never revisit its own cells</text>
  <text x="40" y="215" fill="#e2e8f0" font-size="12.5">choose: save the char, write '#' &#8195;&#8594;&#8195; explore all 4 directions &#8195;&#8594;&#8195; unchoose: write the char back</text>

  <text x="40" y="262" fill="#f87171" font-size="12.5" font-weight="bold">the classic leak:</text>
  <text x="175" y="262" fill="#f87171" font-size="12.5" font-family="Consolas, monospace">return dfs(&#8230;) || dfs(&#8230;);   // short-circuits BEFORE restoring</text>
  <text x="40" y="290" fill="#34d399" font-size="12.5" font-weight="bold">the fix:</text>
  <text x="175" y="290" fill="#34d399" font-size="12.5" font-family="Consolas, monospace">found = &#8230;; b[r][c] = saved; return found;</text>
</svg>
