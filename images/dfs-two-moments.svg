<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
    <marker id="arRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#f87171"/></marker>
    <marker id="arBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/></marker>
    <marker id="arGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#34d399"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">THE TWO MOMENTS</text>
  <rect x="40" y="62" width="350" height="218" rx="10" fill="none" stroke="#334155"/>
  <text x="60" y="95" fill="#e2e8f0" font-size="14" font-family="Consolas, monospace">dfs(A) {</text>
  <line x1="78" y1="106" x2="78" y2="140" stroke="#60a5fa" stroke-width="2" marker-end="url(#arBlue)"/>
  <text x="95" y="128" fill="#60a5fa" font-size="12.5">pre-order &#183; inherited state flows DOWN</text>
  <text x="60" y="172" fill="#e2e8f0" font-size="14" font-family="Consolas, monospace">   dfs(B);  dfs(C);</text>
  <line x1="78" y1="228" x2="78" y2="194" stroke="#34d399" stroke-width="2" marker-end="url(#arGreen)"/>
  <text x="95" y="216" fill="#34d399" font-size="12.5">post-order &#183; synthesized answers flow UP</text>
  <text x="60" y="260" fill="#e2e8f0" font-size="14" font-family="Consolas, monospace">}</text>
  <text x="40" y="312" fill="#94a3b8" font-size="12.5">call stack = the current root-to-here path &#8594; O(depth) memory</text>

  <text x="470" y="45" fill="#f8fafc" font-size="14" font-weight="bold">THE THREE COLORS (mid-DFS)</text>
  <line x1="560" y1="122" x2="560" y2="154" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="560" y1="192" x2="560" y2="224" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="577" y1="105" x2="679" y2="105" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="577" y1="175" x2="679" y2="175" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <path d="M 545,236 C 494,206 494,144 543,114" fill="none" stroke="#f87171" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arRed)"/>
  <text x="398" y="164" fill="#f87171" font-size="12.5">back edge</text>
  <text x="398" y="182" fill="#f87171" font-size="12.5">&#8594; cycle!</text>

  <circle cx="560" cy="105" r="17" fill="#f59e0b"/><text x="560" y="110" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">A</text>
  <circle cx="560" cy="175" r="17" fill="#f59e0b"/><text x="560" y="180" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">B</text>
  <circle cx="560" cy="245" r="17" fill="#f59e0b"/><text x="560" y="250" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">C</text>
  <circle cx="700" cy="105" r="17" fill="none" stroke="#94a3b8" stroke-width="1.6"/><text x="700" y="110" fill="#e2e8f0" font-size="13" text-anchor="middle">D</text>
  <circle cx="700" cy="175" r="17" fill="#334155" stroke="#475569"/><text x="700" y="180" fill="#e2e8f0" font-size="13" text-anchor="middle">E</text>

  <circle cx="480" cy="298" r="7" fill="#f59e0b"/><text x="494" y="303" fill="#cbd5e1" font-size="12">gray = on the stack (the live path)</text>
  <circle cx="480" cy="322" r="7" fill="#334155" stroke="#475569"/><text x="494" y="327" fill="#cbd5e1" font-size="12">black = finished &#8212; edges into black are always safe</text>
  <circle cx="720" cy="298" r="7" fill="none" stroke="#94a3b8"/><text x="734" y="303" fill="#cbd5e1" font-size="12">white = untouched</text>
</svg>
