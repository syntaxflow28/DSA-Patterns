<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">ONE DFS LAUNCH PER COMPONENT</text>
  <rect x="55" y="68" width="150" height="112" rx="14" fill="none" stroke="#334155" stroke-dasharray="5 4"/>
  <rect x="245" y="68" width="150" height="112" rx="14" fill="none" stroke="#334155" stroke-dasharray="5 4"/>
  <rect x="423" y="86" width="64" height="70" rx="14" fill="none" stroke="#334155" stroke-dasharray="5 4"/>
  <line x1="90" y1="120" x2="170" y2="95" stroke="#64748b" stroke-width="1.8"/>
  <line x1="90" y1="120" x2="170" y2="150" stroke="#64748b" stroke-width="1.8"/>
  <line x1="280" y1="120" x2="360" y2="95" stroke="#64748b" stroke-width="1.8"/>
  <line x1="360" y1="95" x2="360" y2="150" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="90" cy="120" r="16" fill="#3b82f6"/><text x="90" y="125" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">0</text>
  <circle cx="170" cy="95" r="16" fill="#3b82f6"/><text x="170" y="100" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="170" cy="150" r="16" fill="#3b82f6"/><text x="170" y="155" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">2</text>
  <circle cx="280" cy="120" r="16" fill="#a78bfa"/><text x="280" y="125" fill="#1e1b4b" font-size="13" font-weight="bold" text-anchor="middle">3</text>
  <circle cx="360" cy="95" r="16" fill="#a78bfa"/><text x="360" y="100" fill="#1e1b4b" font-size="13" font-weight="bold" text-anchor="middle">4</text>
  <circle cx="360" cy="150" r="16" fill="#a78bfa"/><text x="360" y="155" fill="#1e1b4b" font-size="13" font-weight="bold" text-anchor="middle">5</text>
  <circle cx="455" cy="121" r="16" fill="#fbbf24"/><text x="455" y="126" fill="#451a03" font-size="13" font-weight="bold" text-anchor="middle">6</text>
  <text x="40" y="225" fill="#e2e8f0" font-size="13" font-family="Consolas, monospace">dfs(0)&#8594;{0,1,2}   dfs(3)&#8594;{3,4,5}   dfs(6)&#8594;{6}</text>
  <text x="40" y="256" fill="#60a5fa" font-size="14" font-weight="bold">3 launches needed  &#8658;  3 components</text>

  <text x="530" y="45" fill="#f8fafc" font-size="14" font-weight="bold">2-COLORING &#8212; WHY ODD CYCLES FAIL</text>
  <line x1="570" y1="100" x2="650" y2="100" stroke="#64748b" stroke-width="1.8"/>
  <line x1="570" y1="180" x2="650" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="570" y1="100" x2="570" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="650" y1="100" x2="650" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="570" cy="100" r="16" fill="#3b82f6"/><text x="570" y="105" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">R</text>
  <circle cx="650" cy="100" r="16" fill="#f472b6"/><text x="650" y="105" fill="#500724" font-size="12" font-weight="bold" text-anchor="middle">B</text>
  <circle cx="570" cy="180" r="16" fill="#f472b6"/><text x="570" y="185" fill="#500724" font-size="12" font-weight="bold" text-anchor="middle">B</text>
  <circle cx="650" cy="180" r="16" fill="#3b82f6"/><text x="650" y="185" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">R</text>
  <text x="540" y="235" fill="#34d399" font-size="12.5">&#10003; even cycle &#8212; colors alternate cleanly</text>

  <line x1="760" y1="95" x2="840" y2="95" stroke="#64748b" stroke-width="1.8"/>
  <line x1="760" y1="95" x2="800" y2="172" stroke="#64748b" stroke-width="1.8"/>
  <line x1="840" y1="95" x2="800" y2="172" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="760" cy="95" r="16" fill="#3b82f6"/><text x="760" y="100" fill="#fff" font-size="12" font-weight="bold" text-anchor="middle">R</text>
  <circle cx="840" cy="95" r="16" fill="#f472b6"/><text x="840" y="100" fill="#500724" font-size="12" font-weight="bold" text-anchor="middle">B</text>
  <circle cx="800" cy="172" r="16" fill="none" stroke="#f87171" stroke-width="2"/><text x="800" y="177" fill="#f87171" font-size="13" font-weight="bold" text-anchor="middle">?</text>
  <text x="716" y="220" fill="#f87171" font-size="12.5">&#10007; odd cycle: ? must differ from BOTH</text>
  <text x="716" y="240" fill="#f87171" font-size="12.5">neighbors &#8212; impossible with 2 colors</text>
</svg>
