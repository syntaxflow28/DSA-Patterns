<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">LAZY SORTED STREAM (173) &#8212; THE STACK IS THE LEFT SPINE</text>
  <line x1="160" y1="105" x2="100" y2="180" stroke="#f59e0b" stroke-width="3"/>
  <line x1="160" y1="105" x2="230" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="100" y1="180" x2="55"  y2="250" stroke="#f59e0b" stroke-width="3"/>
  <line x1="100" y1="180" x2="150" y2="250" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="160" cy="105" r="16" fill="#f59e0b"/><text x="160" y="110" fill="#0f172a" font-size="12.5" font-weight="bold" text-anchor="middle">8</text>
  <circle cx="100" cy="180" r="16" fill="#f59e0b"/><text x="100" y="185" fill="#0f172a" font-size="12.5" font-weight="bold" text-anchor="middle">3</text>
  <circle cx="230" cy="180" r="16" fill="#3b82f6"/><text x="230" y="185" fill="#fff" font-size="12.5" font-weight="bold" text-anchor="middle">10</text>
  <circle cx="55"  cy="250" r="16" fill="#f59e0b"/><text x="55"  y="255" fill="#0f172a" font-size="12.5" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="150" cy="250" r="16" fill="#3b82f6"/><text x="150" y="255" fill="#fff" font-size="12.5" font-weight="bold" text-anchor="middle">6</text>

  <text x="330" y="80" fill="#94a3b8" font-size="11.5">stack (top first)</text>
  <g font-size="13" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="330" y="92"  width="80" height="32" rx="6" fill="#f59e0b"/><text x="370" y="113" fill="#0f172a">1</text>
    <rect x="330" y="130" width="80" height="32" rx="6" fill="#1e293b" stroke="#334155"/><text x="370" y="151" fill="#e2e8f0">3</text>
    <rect x="330" y="168" width="80" height="32" rx="6" fill="#1e293b" stroke="#334155"/><text x="370" y="189" fill="#e2e8f0">8</text>
  </g>

  <text x="450" y="105" fill="#34d399" font-size="12.5" font-weight="bold">next(): pop 1 &#8212; the MIN of everything remaining</text>
  <text x="450" y="126" fill="#94a3b8" font-size="12">then push the left spine of 1-&#62;right &#8212; invariant restored</text>
  <text x="450" y="165" fill="#e2e8f0" font-size="13" font-family="Consolas, monospace">stream: 1, 3, 6, 8, 10, &#8230;</text>
  <text x="450" y="205" fill="#60a5fa" font-size="12.5">each node pushed &#38; popped exactly once</text>
  <text x="450" y="225" fill="#60a5fa" font-size="12.5">&#8658; next() amortized O(1), worst-case O(h); space O(h)</text>
  <text x="450" y="260" fill="#94a3b8" font-size="12">forward spine + reverse spine = two pointers on the</text>
  <text x="450" y="278" fill="#94a3b8" font-size="12">implicit sorted array (653's strong solution)</text>
</svg>
