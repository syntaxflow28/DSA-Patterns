<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">THE LIFE OF ONE NODE</text>
  <rect x="40" y="65" width="350" height="200" rx="10" fill="none" stroke="#334155"/>
  <text x="60" y="102" fill="#60a5fa" font-size="13" font-weight="bold">&#9312; arrive &#8212; PRE-ORDER moment</text>
  <text x="78" y="124" fill="#94a3b8" font-size="11.5">inherited state flows down (path, sums, bounds)</text>
  <text x="60" y="162" fill="#e2e8f0" font-size="13">&#9313; recurse left, then right</text>
  <text x="60" y="202" fill="#34d399" font-size="13" font-weight="bold">&#9314; leave &#8212; POST-ORDER moment</text>
  <text x="78" y="224" fill="#94a3b8" font-size="11.5">children's answers in hand &#8212; synthesize up</text>
  <text x="40" y="310" fill="#f59e0b" font-size="12.5">who determines the value?  ancestors &#8594; pre-order param down  &#183;  descendants &#8594; post-order return up</text>

  <text x="470" y="45" fill="#f8fafc" font-size="14" font-weight="bold">ONE TREE, THREE ORDERS</text>
  <line x1="590" y1="100" x2="525" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="590" y1="100" x2="655" y2="180" stroke="#64748b" stroke-width="1.8"/>
  <line x1="525" y1="180" x2="485" y2="260" stroke="#64748b" stroke-width="1.8"/>
  <line x1="525" y1="180" x2="565" y2="260" stroke="#64748b" stroke-width="1.8"/>
  <circle cx="590" cy="100" r="16" fill="#3b82f6"/><text x="590" y="105" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">A</text>
  <circle cx="525" cy="180" r="16" fill="#3b82f6"/><text x="525" y="185" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">B</text>
  <circle cx="655" cy="180" r="16" fill="#3b82f6"/><text x="655" y="185" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">C</text>
  <circle cx="485" cy="260" r="16" fill="#3b82f6"/><text x="485" y="265" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">D</text>
  <circle cx="565" cy="260" r="16" fill="#3b82f6"/><text x="565" y="265" fill="#fff" font-size="13" font-weight="bold" text-anchor="middle">E</text>

  <text x="700" y="115" fill="#60a5fa" font-size="13" font-weight="bold">pre:</text><text x="750" y="115" fill="#e2e8f0" font-size="13" font-family="Consolas, monospace">A B D E C</text>
  <text x="700" y="155" fill="#a78bfa" font-size="13" font-weight="bold">in:</text><text x="750" y="155" fill="#e2e8f0" font-size="13" font-family="Consolas, monospace">D B E A C</text>
  <text x="700" y="195" fill="#34d399" font-size="13" font-weight="bold">post:</text><text x="750" y="195" fill="#e2e8f0" font-size="13" font-family="Consolas, monospace">D E B A C</text>
  <text x="700" y="240" fill="#94a3b8" font-size="11.5">pre = on the way down</text>
  <text x="700" y="258" fill="#94a3b8" font-size="11.5">post = on the way back up</text>
</svg>
