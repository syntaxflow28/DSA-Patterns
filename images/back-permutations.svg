<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">NO START INDEX &#8212; EVERY LEVEL SCANS ALL UNUSED ([1,2,3])</text>
  <line x1="170" y1="112" x2="90"  y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="170" y1="112" x2="170" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="170" y1="112" x2="250" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="90"  y1="207" x2="60"  y2="262" stroke="#64748b" stroke-width="1.8"/>
  <line x1="90"  y1="207" x2="130" y2="262" stroke="#64748b" stroke-width="1.8"/>
  <g font-size="12.5" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="140" y="80"  width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="170" y="101" fill="#e2e8f0">[]</text>
    <rect x="60"  y="175" width="60" height="32" rx="8" fill="#f59e0b"/><text x="90"  y="196" fill="#0f172a">[1]</text>
    <rect x="140" y="175" width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="170" y="196" fill="#e2e8f0">[2]</text>
    <rect x="220" y="175" width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="250" y="196" fill="#e2e8f0">[3]</text>
    <rect x="30"  y="262" width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="60"  y="283" fill="#e2e8f0">[1,2]</text>
    <rect x="100" y="262" width="64" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="132" y="283" fill="#e2e8f0">[1,3]</text>
  </g>
  <text x="200" y="250" fill="#94a3b8" font-size="12">under [1]: candidates are ALL of</text>
  <text x="200" y="268" fill="#94a3b8" font-size="12">{2,3} &#8212; 1 is blocked by used[]:</text>
  <text x="200" y="292" fill="#e2e8f0" font-size="12.5" font-family="Consolas, monospace">used = [T, F, F]</text>

  <text x="500" y="45" fill="#f8fafc" font-size="14" font-weight="bold">DUPLICATES ([1,1&#8242;,2]): CONSUME EQUALS LEFT&#8594;RIGHT</text>
  <line x1="640" y1="112" x2="560" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <line x1="640" y1="112" x2="640" y2="175" stroke="#f87171" stroke-width="1.8" stroke-dasharray="5 4"/>
  <line x1="640" y1="112" x2="720" y2="175" stroke="#64748b" stroke-width="1.8"/>
  <g font-size="12.5" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="610" y="80"  width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="640" y="101" fill="#e2e8f0">[]</text>
    <rect x="530" y="175" width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="560" y="196" fill="#e2e8f0">[1]</text>
    <rect x="610" y="175" width="60" height="32" rx="8" fill="#1e293b" stroke="#f87171"/><text x="640" y="196" fill="#f87171">[1&#8242;]</text>
    <rect x="690" y="175" width="60" height="32" rx="8" fill="#1e293b" stroke="#334155"/><text x="720" y="196" fill="#e2e8f0">[2]</text>
  </g>
  <text x="500" y="245" fill="#f87171" font-size="12.5" font-family="Consolas, monospace">a[i]==a[i-1] &#38;&#38; !used[i-1] &#8594; skip</text>
  <text x="500" y="275" fill="#94a3b8" font-size="12">starting with the SECOND 1 while the first sits unused would</text>
  <text x="500" y="293" fill="#94a3b8" font-size="12">rebuild a permutation another branch already owns &#8212;</text>
  <text x="500" y="311" fill="#94a3b8" font-size="12">equal values are forced to be consumed in one canonical order</text>
</svg>
