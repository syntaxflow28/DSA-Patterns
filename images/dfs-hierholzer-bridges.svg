<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="450" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">HIERHOLZER (332) &#8212; THE POST-ORDER SPLICE</text>
  <path d="M 141,113 C 190,80 232,80 280,113" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <path d="M 280,138 C 232,171 190,171 142,139" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <line x1="120" y1="146" x2="120" y2="211" stroke="#64748b" stroke-width="1.8" marker-end="url(#ar)"/>
  <circle cx="120" cy="125" r="21" fill="#3b82f6"/><text x="120" y="130" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">JFK</text>
  <circle cx="300" cy="125" r="21" fill="#3b82f6"/><text x="300" y="130" fill="#fff" font-size="11" font-weight="bold" text-anchor="middle">NRT</text>
  <circle cx="120" cy="233" r="21" fill="#f59e0b"/><text x="120" y="238" fill="#451a03" font-size="11" font-weight="bold" text-anchor="middle">KUL</text>
  <text x="90" y="278" fill="#94a3b8" font-size="11.5">dead end</text>

  <text x="420" y="95"  fill="#f87171" font-size="12.5">lexical-greedy walk: JFK &#8594; KUL &#8230; STUCK (KUL has no edges)</text>
  <text x="420" y="128" fill="#e2e8f0" font-size="13" font-family="Consolas, monospace">post-order finish: KUL, JFK, NRT, JFK</text>
  <text x="420" y="158" fill="#34d399" font-size="13" font-family="Consolas, monospace">reversed:  JFK &#8594; NRT &#8594; JFK &#8594; KUL  &#10003;</text>
  <text x="420" y="192" fill="#94a3b8" font-size="12.5">the dead end lands LAST; the NRT detour splices itself in</text>
  <text x="420" y="212" fill="#94a3b8" font-size="12.5">automatically &#8212; pre-order output would emit KUL too early</text>

  <line x1="40" y1="265" x2="840" y2="265" stroke="#1e293b"/>

  <text x="40" y="300" fill="#f8fafc" font-size="14" font-weight="bold">TARJAN BRIDGES (1192) &#8212; low-link vs tin</text>
  <line x1="150" y1="345" x2="90"  y2="415" stroke="#64748b" stroke-width="1.8"/>
  <line x1="150" y1="345" x2="210" y2="415" stroke="#64748b" stroke-width="1.8"/>
  <path d="M 105,406 C 130,380 175,380 196,406" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="118" y="378" fill="#60a5fa" font-size="11.5">rope (back edge)</text>
  <line x1="227" y1="415" x2="313" y2="415" stroke="#f87171" stroke-width="3"/>
  <line x1="347" y1="415" x2="433" y2="415" stroke="#f87171" stroke-width="3"/>
  <text x="262" y="404" fill="#f87171" font-size="12">&#9986;</text>
  <text x="382" y="404" fill="#f87171" font-size="12">&#9986;</text>
  <circle cx="150" cy="345" r="17" fill="#3b82f6"/><text x="150" y="350" fill="#fff" font-size="12.5" font-weight="bold" text-anchor="middle">1</text>
  <circle cx="90"  cy="415" r="17" fill="#3b82f6"/><text x="90"  y="420" fill="#fff" font-size="12.5" font-weight="bold" text-anchor="middle">2</text>
  <circle cx="210" cy="415" r="17" fill="#3b82f6"/><text x="210" y="420" fill="#fff" font-size="12.5" font-weight="bold" text-anchor="middle">0</text>
  <circle cx="330" cy="415" r="17" fill="#3b82f6"/><text x="330" y="420" fill="#fff" font-size="12.5" font-weight="bold" text-anchor="middle">3</text>
  <circle cx="450" cy="415" r="17" fill="#3b82f6"/><text x="450" y="420" fill="#fff" font-size="12.5" font-weight="bold" text-anchor="middle">4</text>
  <text x="150" y="325" fill="#94a3b8" font-size="10.5" text-anchor="middle">tin 1</text>
  <text x="62"  y="440" fill="#94a3b8" font-size="10.5" text-anchor="middle">tin 2</text>
  <text x="210" y="445" fill="#94a3b8" font-size="10.5" text-anchor="middle">tin 0</text>
  <text x="330" y="445" fill="#94a3b8" font-size="10.5" text-anchor="middle">tin 3</text>
  <text x="450" y="445" fill="#94a3b8" font-size="10.5" text-anchor="middle">tin 4</text>

  <text x="520" y="340" fill="#f87171" font-size="12.5">low[3] = 3 &#62; tin[0] = 0  &#8594;  0&#8212;3 is a bridge &#9986;</text>
  <text x="520" y="368" fill="#60a5fa" font-size="12.5">low[1] = 0 &#8804; tin[0]  &#8594;  triangle edges are safe</text>
  <text x="520" y="398" fill="#94a3b8" font-size="12">2's back edge to 0 is the rope that saves the triangle;</text>
  <text x="520" y="418" fill="#94a3b8" font-size="12">3's subtree has no rope above 0 &#8212; cut 0&#8212;3 and it floats away</text>
</svg>
