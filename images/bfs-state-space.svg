<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0f172a" stroke="#1e293b"/>

  <text x="40" y="45" fill="#f8fafc" font-size="14" font-weight="bold">THE GRAPH IS IMPLICIT &#8212; A STATE AND ITS NEIGHBORS (752)</text>
  <line x1="200" y1="185" x2="105" y2="115" stroke="#64748b" stroke-width="1.5"/>
  <line x1="200" y1="185" x2="200" y2="105" stroke="#64748b" stroke-width="1.5"/>
  <line x1="200" y1="185" x2="295" y2="115" stroke="#64748b" stroke-width="1.5"/>
  <line x1="200" y1="185" x2="90"  y2="185" stroke="#64748b" stroke-width="1.5"/>
  <line x1="200" y1="185" x2="310" y2="185" stroke="#64748b" stroke-width="1.5"/>
  <line x1="200" y1="185" x2="105" y2="255" stroke="#64748b" stroke-width="1.5"/>
  <line x1="200" y1="185" x2="200" y2="265" stroke="#64748b" stroke-width="1.5"/>
  <line x1="200" y1="185" x2="295" y2="255" stroke="#64748b" stroke-width="1.5"/>
  <g font-size="11.5" font-weight="bold" text-anchor="middle" font-family="Consolas, monospace">
    <rect x="168" y="170" width="64" height="30" rx="8" fill="#f59e0b"/><text x="200" y="190" fill="#0f172a">0000</text>
    <rect x="73"  y="100" width="64" height="26" rx="8" fill="#1e293b" stroke="#334155"/><text x="105" y="117" fill="#e2e8f0">1000</text>
    <rect x="168" y="79"  width="64" height="26" rx="8" fill="#1e293b" stroke="#334155"/><text x="200" y="96"  fill="#e2e8f0">9000</text>
    <rect x="263" y="100" width="64" height="26" rx="8" fill="#1e293b" stroke="#334155"/><text x="295" y="117" fill="#e2e8f0">0100</text>
    <rect x="26"  y="172" width="64" height="26" rx="8" fill="#1e293b" stroke="#334155"/><text x="58"  y="189" fill="#e2e8f0">0900</text>
    <rect x="310" y="172" width="64" height="26" rx="8" fill="#1e293b" stroke="#334155"/><text x="342" y="189" fill="#e2e8f0">0010</text>
    <rect x="73"  y="244" width="64" height="26" rx="8" fill="#1e293b" stroke="#334155"/><text x="105" y="261" fill="#e2e8f0">0090</text>
    <rect x="168" y="252" width="64" height="26" rx="8" fill="#1e293b" stroke="#334155"/><text x="200" y="269" fill="#e2e8f0">0001</text>
    <rect x="263" y="244" width="64" height="26" rx="8" fill="#1e293b" stroke="#334155"/><text x="295" y="261" fill="#e2e8f0">0009</text>
  </g>
  <text x="40" y="310" fill="#94a3b8" font-size="12">8 neighbors: each of 4 wheels, &#177;1 (with wrap)</text>

  <text x="470" y="90" fill="#e2e8f0" font-size="13" font-weight="bold">no adjacency list exists &#8212; just:</text>
  <text x="470" y="120" fill="#60a5fa" font-size="13" font-family="Consolas, monospace">a state (the node)</text>
  <text x="470" y="148" fill="#60a5fa" font-size="13" font-family="Consolas, monospace">a generator of neighbor states</text>
  <text x="470" y="190" fill="#94a3b8" font-size="12.5">BFS then finds the minimum number of moves</text>
  <text x="470" y="210" fill="#94a3b8" font-size="12.5">between any two states &#8212; 10&#8308; lock states, fine</text>
  <text x="470" y="250" fill="#f59e0b" font-size="12.5">composite states are the hard-problem move:</text>
  <text x="470" y="272" fill="#f59e0b" font-size="12.5" font-family="Consolas, monospace">(position, keys collected) &#8212; LC 864</text>
  <text x="470" y="305" fill="#94a3b8" font-size="12">half of hard BFS is state DESIGN, not traversal</text>
</svg>
